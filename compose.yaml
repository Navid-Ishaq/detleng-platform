name: detleng-platform

services:
  gateway:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      pgadmin:
        condition: service_healthy
    environment:
      AIRFLOW_UPSTREAM: ${AIRFLOW_UPSTREAM:-host.docker.internal:8080}
    ports:
      - "${PLATFORM_HTTP_PORT:-8088}:80"
      - "${PLATFORM_HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/srv/platform:ro
      - ./backend/dbt/site:/srv/dbt:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pgadmin:
    image: dpage/pgadmin4:9.14
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PORT_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: "1"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backend/postgresql/servers.json:/pgadmin4/servers.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
  pgadmin_data:
